# 결정 근거: docs/adr/0013-cd-dockerhub-ec2.md
# Story-1-3-1 (Docker Hub Push) + Story-1-3-2 (EC2 SSH deploy)
#
# Trigger: CI (workflow_run) 그린 + main push 만 → PR 미실행

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# 동일 SHA 의 동시 deploy 회피 (예: 빠른 연속 push)
concurrency:
  group: cd-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Docker Hub Build & Push
    # CI 결과가 success + 이벤트가 push 일 때만 (PR 빌드 결과는 제외)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout (CI 가 빌드한 동일 SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"
          echo "sha_tag=${USER}/nbc-profile:${SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${USER}/nbc-profile:latest" >> "$GITHUB_OUTPUT"

      - name: Build & Push (SHA + latest, GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
