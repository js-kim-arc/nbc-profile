# 결정 근거: docs/adr/0013-cd-dockerhub-ec2.md
# Story-1-3-1 (Docker Hub Push) + Story-1-3-2 (EC2 SSH deploy)
#
# Trigger: CI (workflow_run) 그린 + main push 만 → PR 미실행

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# 동일 SHA 의 동시 deploy 회피 (예: 빠른 연속 push)
concurrency:
  group: cd-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Docker Hub Build & Push
    # CI 결과가 success + 이벤트가 push 일 때만 (PR 빌드 결과는 제외)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout (CI 가 빌드한 동일 SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"
          echo "sha_tag=${USER}/nbc-profile:${SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${USER}/nbc-profile:latest" >> "$GITHUB_OUTPUT"

      - name: Build & Push (SHA + latest, GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: EC2 deploy (docker pull/run + health gate)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH → docker pull/run + health gate
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          # GitHub Actions 컨텍스트의 secret 을 ssh-action 환경변수로 노출
          # (ssh script 안에서 ${DOCKERHUB_USERNAME} 로 사용)
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${DOCKERHUB_USERNAME}/nbc-profile:latest"
            ENV_FILE="/home/ec2-user/.env"

            if [ ! -f "$ENV_FILE" ]; then
              echo "ERROR: $ENV_FILE not found — README 'EC2 사전 준비' 참조"
              exit 1
            fi

            echo "[1/4] docker pull $IMAGE"
            docker pull "$IMAGE"

            echo "[2/4] stop/rm 기존 컨테이너 (최초 배포 시 부재 — || true 흡수)"
            docker stop nbc-profile 2>/dev/null || true
            docker rm   nbc-profile 2>/dev/null || true

            echo "[3/4] docker run -d --restart=always"
            docker run -d \
              --name nbc-profile \
              --restart=always \
              -p 8080:8080 \
              --env-file "$ENV_FILE" \
              "$IMAGE"

            echo "[4/4] health gate (최대 60s)"
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q '"UP"'; then
                echo "deploy OK (i=$i)"
                docker ps --filter name=nbc-profile --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: health check timeout — 컨테이너 로그:"
            docker logs --tail 100 nbc-profile || true
            exit 1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
