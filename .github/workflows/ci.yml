# 결정 근거: docs/adr/0012-github-actions-ci-pipeline.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 PR 에 새 커밋 push 시 진행 중인 워크플로 취소 (Actions 분 절약)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (JDK 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew permission (Linux runner)
        run: chmod +x gradlew

      - name: Gradle build (compile + test + jar)
        run: ./gradlew --no-daemon clean build

      - name: Upload test reports (실패 시에도 — 원인 분석용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build artifact (성공 시 — Epic 1-3 Docker Push 후보)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 7
